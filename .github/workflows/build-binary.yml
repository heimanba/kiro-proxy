name: Build binary

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - run: bun install --frozen-lockfile
      - run: bun test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            outfile: kiro-proxy-linux-x64
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
            outfile: kiro-proxy-linux-arm64
          - os: windows-latest
            target: bun-windows-x64
            outfile: kiro-proxy-windows-x64.exe
          - os: macos-latest
            target: bun-darwin-arm64
            outfile: kiro-proxy-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - run: bun install --frozen-lockfile
      - name: Compile standalone binary
        run: |
          bun build --compile ./index.ts --outfile="${{ matrix.outfile }}" --target="${{ matrix.target }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.outfile }}
          path: ${{ matrix.outfile }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: kiro-proxy-*
          merge-multiple: true
          path: release-assets
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          generate_release_notes: true
